<!DOCTYPE html>
<html>
<head>
  <title>Protected Dashboard</title>
  <style>
    #content { display: none; }
  </style>
</head>
<body>

<h2>Enter Password</h2>
<input type="password" id="pwd">
<button onclick="checkPwd()">Submit</button>

<div id="content">
  
  <!-- Your Excel embed here -->
  <iframe width="1920" height="1080" frameborder="0" scrolling="no" src="https://1drv.ms/x/c/B35F82348C73E28B/IQQqrAzV0q_9QJ7WpnlaCorEARf8Vzh9raakCzEeRAD71NM?em=2&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True&wdInConfigurator=True&wdInConfigurator=True"></iframe>
</div>

<script>
function checkPwd() {
  var password = document.getElementById("pwd").value;
  if (password === "passpass") {
    document.getElementById("content").style.display = "block";
  } else {
    alert("Wrong password");
  }
}
</script>

  
</body>
</html>
