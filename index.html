<!DOCTYPE html>
<html>
<head>
  <title>Protected Dashboard</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    #login {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    #content {
      display: none;
      width: 100%;
      height: 100vh;
    }

    input {
      padding: 10px;
      margin: 10px 0;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

<div id="login">
  <h2>Enter Password</h2>
  <input type="password" id="pwd">
  <br>
  <button onclick="checkPwd()">Submit</button>
</div>

<div id="content">
  <iframe src="https://1drv.ms/x/c/B35F82348C73E28B/IQQqrAzV0q_9QJ7WpnlaCorEARf8Vzh9raakCzEeRAD71NM?em=2&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True&wdInConfigurator=True"></iframe>
</div>

<script>
function checkPwd() {
  var password = document.getElementById("pwd").value;
  if (password === "passpass") {
    document.getElementById("login").style.display = "none";
    document.getElementById("content").style.display = "block";
    document.body.style.display = "block"; // remove centering effect
  } else {
    alert("Wrong password");
  }
}
</script>

</body>
</html>
